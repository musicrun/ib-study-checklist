<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <title>IB Study Checklist</title>
 <link rel="preconnect" href="https://fonts.googleapis.com">
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
 <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
 <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
 <style>
   /* Art direction: exam war room → focused, intense, purposeful
      Palette: near-black surfaces, warm cream text, sharp teal accent
      Typography: 'Geist Mono' (headings/labels) + 'Inter' (body) — clarity + slight technical edge
      Density: dense — this is a tool, not a landing page */

   /* ===== BASE RESET ===== */
   *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
   html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
   body { font-family: 'Inter', system-ui, -apple-system, sans-serif; line-height: 1.5; color: var(--color-text); background: var(--color-bg); min-height: 100vh; }
   a { text-decoration: none; color: inherit; }
   button { font-family: inherit; border: none; background: none; cursor: pointer; color: inherit; }
   ul { list-style: none; }
   input, label { font-family: inherit; }
   img { max-width: 100%; display: block; }
   ::-webkit-scrollbar { width: 8px; }
   ::-webkit-scrollbar-track { background: transparent; }
   ::-webkit-scrollbar-thumb { background: var(--color-surface-offset); border-radius: 4px; }

   /* ===== TOKENS ===== */
   :root {
     /* Radius */
     --radius-none: 0;
     --radius-sm: 4px;
     --radius-base: 6px;
     --radius-md: 8px;
     --radius-lg: 12px;
     --radius-xl: 16px;
     --radius-2xl: 24px;
     --radius-full: 9999px;

     /* Space */
     --space-0: 0;
     --space-1: 4px;
     --space-2: 8px;
     --space-3: 12px;
     --space-4: 16px;
     --space-5: 20px;
     --space-6: 24px;
     --space-8: 32px;
     --space-10: 40px;
     --space-12: 48px;
     --space-16: 64px;
     --space-20: 80px;
     --space-24: 96px;

     /* Text */
     --text-xs: 0.75rem;
     --text-sm: 0.8125rem;
     --text-base: 0.9375rem;
     --text-md: 1rem;
     --text-lg: 1.125rem;
     --text-xl: 1.375rem;
     --text-2xl: 1.75rem;
     --text-3xl: 2.25rem;

     /* Shadows */
     --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
     --shadow-md: 0 4px 8px rgba(0,0,0,0.25);
     --shadow-lg: 0 8px 24px rgba(0,0,0,0.3);
     --shadow-xl: 0 16px 48px rgba(0,0,0,0.35);

     /* Transition */
     --transition-interactive: 150ms ease;
   }

   :root, [data-theme="dark"] {
     --color-bg:              #0e0e0e;
     --color-surface:         #141414;
     --color-surface-2:       #1a1a1a;
     --color-surface-offset:  #202020;
     --color-border:          #2a2a2a;
     --color-divider:         #252525;
     --color-text:            #e8e4dc;
     --color-text-muted:      #7a7670;
     --color-text-faint:      #3e3c39;
     --color-primary:         #2dd4bf;
     --color-primary-hover:   #14b8a6;
     --color-success:         #4ade80;
     --color-warning:         #fb923c;
     --color-error:           #f87171;

     /* Subject accents */
     --subject-math:          #2dd4bf;
     --subject-physics:       #fb923c;
     --subject-cs:            #60a5fa;
     --subject-econ:          #fbbf24;
   }

   [data-theme="light"] {
     --color-bg:              #f5f4f0;
     --color-surface:         #fafaf8;
     --color-surface-2:       #ffffff;
     --color-surface-offset:  #eeecea;
     --color-border:          #d8d6d0;
     --color-divider:         #e0deda;
     --color-text:            #1c1b18;
     --color-text-muted:      #6b6a64;
     --color-text-faint:      #b8b6b0;
     --color-primary:         #0d9488;
     --color-primary-hover:   #0f766e;
     --color-success:         #16a34a;
     --color-warning:         #ea580c;
     --color-error:           #dc2626;

     --subject-math:          #0d9488;
     --subject-physics:       #ea580c;
     --subject-cs:            #2563eb;
     --subject-econ:          #d97706;
   }

   /* ===== LAYOUT ===== */
   .app { display: flex; height: 100vh; overflow: hidden; }

   /* SIDEBAR */
   .sidebar {
     width: 220px;
     flex-shrink: 0;
     background: var(--color-surface);
     border-right: 1px solid var(--color-border);
     display: flex;
     flex-direction: column;
     padding: var(--space-4);
     gap: var(--space-4);
     z-index: 10;
   }
   .sidebar-header {
     display: flex;
     align-items: center;
     justify-content: space-between;
   }
   .sidebar-title {
     font-family: 'Geist Mono', monospace;
     font-size: var(--text-lg);
     font-weight: 600;
     color: var(--color-primary);
   }
   .theme-toggle {
     width: 32px; height: 32px;
     display: flex; align-items: center; justify-content: center;
     border-radius: var(--radius-md);
     color: var(--color-text-muted);
     transition: color var(--transition-interactive), background var(--transition-interactive);
   }
   .theme-toggle:hover { background: var(--color-surface-offset); color: var(--color-text); }

   .nav-subjects { display: flex; flex-direction: column; gap: var(--space-1); flex: 1; }
   .nav-link {
     display: flex;
     align-items: center;
     gap: var(--space-3);
     padding: var(--space-2) var(--space-3);
     border-radius: var(--radius-md);
     font-family: 'Geist Mono', monospace;
     font-size: var(--text-sm);
     font-weight: 500;
     color: var(--color-text-muted);
     transition: all var(--transition-interactive);
     border-left: 3px solid transparent;
   }
   .nav-link:hover { background: var(--color-surface-2); color: var(--color-text); }
   .nav-link.active { background: var(--color-surface-offset); color: var(--color-text); border-left-color: var(--color-primary); }
   .nav-dot { width: 8px; height: 8px; border-radius: var(--radius-full); }

   .sidebar-footer {
     border-top: 1px solid var(--color-border);
     padding-top: var(--space-4);
     display: flex;
     flex-direction: column;
     gap: var(--space-2);
   }
   .progress-bar-track {
     width: 100%; height: 6px;
     background: var(--color-surface-offset);
     border-radius: var(--radius-full);
     overflow: hidden;
   }
   .progress-bar-fill {
     height: 100%; background: var(--color-primary);
     border-radius: var(--radius-full);
     transition: width 0.4s ease;
   }
   .progress-text {
     font-family: 'Geist Mono', monospace;
     font-size: var(--text-xs);
     color: var(--color-text-muted);
   }

   /* MAIN */
   .main {
     flex: 1;
     overflow-y: auto;
     overflow-x: hidden;
     position: relative;
   }
   .main-inner {
     max-width: 960px;
     margin: 0 auto;
     padding: var(--space-6) var(--space-6) var(--space-20);
   }

   /* STICKY HEADER */
   .sticky-bar {
     position: sticky;
     top: 0;
     z-index: 5;
     background: var(--color-bg);
     backdrop-filter: blur(12px);
     border-bottom: 1px solid var(--color-border);
     padding: var(--space-3) var(--space-6);
     display: flex;
     align-items: center;
     justify-content: space-between;
     gap: var(--space-4);
   }
   .sticky-bar-subject {
     font-family: 'Geist Mono', monospace;
     font-size: var(--text-md);
     font-weight: 600;
     color: var(--color-text);
   }
   .sticky-bar-progress {
     font-family: 'Geist Mono', monospace;
     font-size: var(--text-sm);
     color: var(--color-text-muted);
   }

   /* FILTER CHIPS */
   .filters {
     position: sticky;
     top: 53px;
     z-index: 4;
     background: var(--color-bg);
     padding: var(--space-3) var(--space-6);
     display: flex;
     gap: var(--space-2);
     flex-wrap: wrap;
     border-bottom: 1px solid var(--color-border);
   }
   .chip {
     padding: var(--space-1) var(--space-3);
     border-radius: var(--radius-full);
     font-family: 'Geist Mono', monospace;
     font-size: var(--text-xs);
     font-weight: 500;
     border: 1px solid var(--color-border);
     color: var(--color-text-muted);
     background: var(--color-surface);
     transition: all var(--transition-interactive);
     cursor: pointer;
   }
   .chip:hover { border-color: var(--color-text-muted); color: var(--color-text); }
   .chip.active { background: var(--color-primary); color: #0e0e0e; border-color: var(--color-primary); }
   [data-theme="light"] .chip.active { color: #fff; }

   /* RESET */
   .reset-btn {
     display: flex; align-items: center; gap: var(--space-2);
     padding: var(--space-2) var(--space-3);
     border-radius: var(--radius-md);
     background: rgba(248,113,113,0.12);
     color: var(--color-error);
     font-family: 'Geist Mono', monospace;
     font-size: var(--text-xs);
     font-weight: 500;
     transition: background var(--transition-interactive);
     white-space: nowrap;
   }
   .reset-btn:hover { background: rgba(248,113,113,0.2); }

   /* SUBJECT SECTION */
   .subject-section {
     margin-top: var(--space-10);
     animation: fadeIn 0.4s ease both;
   }
   .subject-section:first-child { margin-top: var(--space-4); }

   @keyframes fadeIn {
     from { opacity: 0; transform: translateY(12px); }
     to { opacity: 1; transform: translateY(0); }
   }

   /* SUBJECT HEADER */
   .subject-header {
     display: flex;
     align-items: flex-start;
     justify-content: space-between;
     gap: var(--space-6);
     padding: var(--space-5);
     background: var(--color-surface);
     border: 1px solid var(--color-border);
     border-radius: var(--radius-lg);
     margin-bottom: var(--space-4);
   }
   .subject-info { display: flex; flex-direction: column; gap: var(--space-2); }
   .subject-name {
     font-family: 'Geist Mono', monospace;
     font-size: var(--text-xl);
     font-weight: 700;
   }
   .subject-meta {
     display: flex;
     align-items: center;
     gap: var(--space-3);
     flex-wrap: wrap;
   }
   .badge {
     font-family: 'Geist Mono', monospace;
     font-size: var(--text-xs);
     font-weight: 500;
     padding: var(--space-1) var(--space-2);
     border-radius: var(--radius-sm);
   }
   .badge-exam { background: var(--color-surface-2); color: var(--color-text-muted); border: 1px solid var(--color-border); }
   .badge-count { background: var(--color-surface-2); color: var(--color-text); border: 1px solid var(--color-border); }
   .badge-countdown {
     font-size: var(--text-xs);
     font-weight: 700;
     padding: var(--space-1) var(--space-2);
     border-radius: var(--radius-sm);
   }
   .countdown-green { background: rgba(74,222,128,0.12); color: var(--color-success); }
   .countdown-orange { background: rgba(251,146,60,0.12); color: var(--color-warning); }
   .countdown-red { background: rgba(248,113,113,0.12); color: var(--color-error); }

   .subject-actions { display: flex; gap: var(--space-2); align-items: center; }
   .btn-sm {
     display: flex; align-items: center; gap: var(--space-2);
     padding: var(--space-2) var(--space-3);
     border-radius: var(--radius-md);
     font-family: 'Geist Mono', monospace;
     font-size: var(--text-xs);
     font-weight: 500;
     background: var(--color-surface-2);
     color: var(--color-text-muted);
     border: 1px solid var(--color-border);
     transition: all var(--transition-interactive);
     white-space: nowrap;
   }
   .btn-sm:hover { background: var(--color-surface-offset); color: var(--color-text); }
   .btn-sm svg { width: 14px; height: 14px; }

   /* PROGRESS RING */
   .progress-ring { flex-shrink: 0; }
   .progress-ring circle { fill: none; transition: stroke-dashoffset 0.4s ease; }
   .progress-ring-track { stroke: var(--color-surface-offset); }
   .progress-ring-fill { stroke-linecap: round; }

   /* BLOCK CARD */
   .block-card {
     background: var(--color-surface);
     border: 1px solid var(--color-border);
     border-radius: var(--radius-lg);
     margin-bottom: var(--space-3);
     overflow: hidden;
     transition: border-color var(--transition-interactive);
   }
   .block-card.block-done { border-color: rgba(74,222,128,0.3); }
   [data-theme="light"] .block-card.block-done { border-color: rgba(22,163,74,0.3); }

   .block-header {
     display: flex;
     align-items: center;
     gap: var(--space-3);
     padding: var(--space-3) var(--space-4);
     cursor: pointer;
     user-select: none;
     transition: background var(--transition-interactive);
     border-bottom: 1px solid transparent;
   }
   .block-header:hover { background: var(--color-surface-2); }
   .block-card.block-open .block-header { border-bottom-color: var(--color-border); }
   .block-card.block-done .block-header { background: rgba(74,222,128,0.06); }
   [data-theme="light"] .block-card.block-done .block-header { background: rgba(22,163,74,0.06); }

   .block-code {
     font-family: 'Geist Mono', monospace;
     font-size: var(--text-xs);
     font-weight: 700;
     padding: var(--space-1) var(--space-2);
     border-radius: var(--radius-sm);
     background: var(--color-surface-2);
     color: var(--color-text);
     border: 1px solid var(--color-border);
     transition: all 0.3s ease;
   }
   .block-card.block-done .block-code {
     background: var(--color-success);
     color: #0e0e0e;
     border-color: var(--color-success);
   }
   [data-theme="light"] .block-card.block-done .block-code { color: #fff; }

   .block-title {
     font-family: 'Inter', sans-serif;
     font-size: var(--text-sm);
     font-weight: 500;
     color: var(--color-text);
     flex: 1;
   }
   .block-card.block-done .block-title { color: var(--color-success); }

   .block-count {
     font-family: 'Geist Mono', monospace;
     font-size: var(--text-xs);
     color: var(--color-text-muted);
     background: var(--color-surface-2);
     padding: var(--space-1) var(--space-2);
     border-radius: var(--radius-sm);
   }

   .block-arrow {
     color: var(--color-text-muted);
     transition: transform 0.25s ease;
     width: 16px; height: 16px;
   }
   .block-card.block-open .block-arrow { transform: rotate(180deg); }

   .block-body {
     max-height: 0;
     overflow: hidden;
     transition: max-height 0.25s ease;
   }
   .block-card.block-open .block-body { max-height: 3000px; }

   .block-list {
     padding: var(--space-2) var(--space-4) var(--space-3);
     display: flex;
     flex-direction: column;
   }

   /* CHECKBOX */
   .checkbox-item {
     display: flex;
     align-items: flex-start;
     gap: var(--space-3);
     padding: var(--space-2) 0;
     cursor: pointer;
     transition: opacity var(--transition-interactive);
   }
   .checkbox-item:hover { opacity: 0.85; }

   .checkbox-input {
     appearance: none;
     width: 18px; height: 18px;
     min-width: 18px;
     border: 2px solid var(--color-border);
     border-radius: var(--radius-sm);
     background: var(--color-surface);
     margin-top: 2px;
     cursor: pointer;
     transition: all var(--transition-interactive);
     position: relative;
     display: flex; align-items: center; justify-content: center;
   }
   .checkbox-input:checked {
     background: var(--color-primary);
     border-color: var(--color-primary);
   }
   .checkbox-input::after {
     content: '';
     width: 5px; height: 9px;
     border: solid #0e0e0e;
     border-width: 0 2px 2px 0;
     transform: rotate(45deg) scale(0);
     transition: transform 0.15s ease;
     position: absolute;
     top: 1px;
   }
   [data-theme="light"] .checkbox-input::after { border-color: #fff; }
   .checkbox-input:checked::after { transform: rotate(45deg) scale(1); }

   .checkbox-text {
     font-size: var(--text-sm);
     color: var(--color-text);
     transition: all var(--transition-interactive);
     line-height: 1.5;
   }
   .checkbox-done .checkbox-text {
     text-decoration: line-through;
     color: var(--color-text-faint);
   }

   /* COMPLETION PULSE */
   @keyframes pulseGreen {
     0% { box-shadow: 0 0 0 0 rgba(74,222,128,0.4); }
     70% { box-shadow: 0 0 0 12px rgba(74,222,128,0); }
     100% { box-shadow: 0 0 0 0 rgba(74,222,128,0); }
   }
   .block-pulse { animation: pulseGreen 0.6s ease; }

   @keyframes highlightYellow {
     0% { background: rgba(251,191,36,0.15); }
     100% { background: transparent; }
   }
   .highlight-pulse { animation: highlightYellow 1s ease; }

   /* MODAL */
   .modal-overlay {
     position: fixed; inset: 0;
     background: rgba(0,0,0,0.6);
     display: none; align-items: center; justify-content: center;
     z-index: 100;
     backdrop-filter: blur(4px);
   }
   .modal-overlay.visible { display: flex; }
   .modal {
     background: var(--color-surface);
     border: 1px solid var(--color-border);
     border-radius: var(--radius-lg);
     padding: var(--space-6);
     max-width: 360px;
     width: 90%;
     box-shadow: var(--shadow-xl);
   }
   .modal-title {
     font-family: 'Geist Mono', monospace;
     font-size: var(--text-lg);
     font-weight: 600;
     color: var(--color-error);
     margin-bottom: var(--space-2);
   }
   .modal-text { font-size: var(--text-sm); color: var(--color-text-muted); margin-bottom: var(--space-5); }
   .modal-actions { display: flex; gap: var(--space-3); justify-content: flex-end; }
   .modal-btn {
     padding: var(--space-2) var(--space-4);
     border-radius: var(--radius-md);
     font-family: 'Geist Mono', monospace;
     font-size: var(--text-xs);
     font-weight: 500;
     border: 1px solid var(--color-border);
     transition: all var(--transition-interactive);
   }
   .modal-btn-secondary { background: var(--color-surface-2); color: var(--color-text); }
   .modal-btn-secondary:hover { background: var(--color-surface-offset); }
   .modal-btn-danger { background: var(--color-error); color: #fff; border-color: var(--color-error); }
   .modal-btn-danger:hover { filter: brightness(0.9); }

   /* HIDDEN */
   .hidden { display: none !important; }

   /* REDUCED MOTION */
   @media (prefers-reduced-motion: reduce) {
     *, *::before, *::after {
       animation-duration: 0.01ms !important;
       animation-iteration-count: 1 !important;
       transition-duration: 0.01ms !important;
     }
   }

   /* MOBILE */
   @media (max-width: 767px) {
     .app { flex-direction: column; }
     .sidebar {
       width: 100%; height: auto;
       flex-direction: row;
       border-right: none;
       border-bottom: 1px solid var(--color-border);
       padding: var(--space-2) var(--space-3);
       align-items: center;
     }
     .sidebar-title { font-size: var(--text-sm); }
     .nav-subjects { flex-direction: row; gap: var(--space-1); flex-wrap: wrap; }
     .nav-link { padding: var(--space-1) var(--space-2); font-size: 0.7rem; }
     .sidebar-footer { display: none; }
     .main-inner { padding: var(--space-3); }
     .sticky-bar { padding: var(--space-2) var(--space-3); top: auto; position: relative; }
     .filters { position: relative; top: auto; padding: var(--space-2) var(--space-3); }
     .subject-header { flex-direction: column; gap: var(--space-3); }
     .subject-actions { flex-wrap: wrap; }
   }
 </style>
</head>
<body>

<div class="app">
 <!-- SIDEBAR -->
 <aside class="sidebar">
   <div class="sidebar-header">
     <div class="sidebar-title">IB Study</div>
     <button class="theme-toggle" id="themeToggle" title="Toggle theme">
       <i data-lucide="moon" class="theme-icon"></i>
     </button>
   </div>
   <nav class="nav-subjects">
     <a href="#subject-math" class="nav-link" data-subject="math">
       <span class="nav-dot" style="background:var(--subject-math)"></span> Math
     </a>
     <a href="#subject-physics" class="nav-link" data-subject="physics">
       <span class="nav-dot" style="background:var(--subject-physics)"></span> Physics
     </a>
     <a href="#subject-cs" class="nav-link" data-subject="cs">
       <span class="nav-dot" style="background:var(--subject-cs)"></span> CS
     </a>
     <a href="#subject-econ" class="nav-link" data-subject="econ">
       <span class="nav-dot" style="background:var(--subject-econ)"></span> Econ
     </a>
   </nav>
   <div class="sidebar-footer">
     <div class="progress-bar-track">
       <div class="progress-bar-fill" id="globalProgressFill" style="width:0%"></div>
     </div>
     <div class="progress-text" id="globalProgressText">0 / 0 topics done</div>
   </div>
 </aside>

 <!-- MAIN -->
 <main class="main" id="mainScroll">
   <div class="sticky-bar">
     <div class="sticky-bar-subject" id="stickySubject">All Subjects</div>
     <div style="display:flex;align-items:center;gap:var(--space-3)">
       <div class="sticky-bar-progress" id="stickyProgress">0%</div>
       <button class="reset-btn" id="resetAllBtn">
         <i data-lucide="trash-2" style="width:12px;height:12px;"></i> Reset
       </button>
     </div>
   </div>

   <div class="filters" id="filterChips">
     <button class="chip active" data-filter="all">All</button>
     <button class="chip" data-filter="math">Math</button>
     <button class="chip" data-filter="physics">Physics</button>
     <button class="chip" data-filter="cs">CS</button>
     <button class="chip" data-filter="econ">Econ</button>
   </div>

   <div class="main-inner" id="contentArea">
     <!-- Content injected by JS -->
   </div>
 </main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="resetModal">
